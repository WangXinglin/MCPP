<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCPP Demos</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #eef2f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(720px, 100%);
        border: 1px solid #d7e0e7;
        border-radius: 8px;
        background: #fff;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 5vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 22px;
        color: #657380;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        border-radius: 8px;
        background: #2869cc;
        color: #fff;
        padding: 0 16px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MCPP Demos</h1>
      <p>Interactive static demos for constraint-driven resource allocation experiments.</p>
      <a href="./codeflow-prediction/">Open CodeFlow Prediction Demo</a>
    </main>
  </body>
</html>
